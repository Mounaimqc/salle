<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SallePro - Connexion & Inscription</title>
  <!-- Google Fonts & Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: linear-gradient(rgba(15, 23, 42, 0.82), rgba(15, 23, 42, 0.88)), 
                  url('https://images.unsplash.com/photo-1519167758481-83f550bb49b3?auto=format&fit=crop&q=80&w=1200') no-repeat center center;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-lg);
      padding: 40px 35px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      color: #ffffff;
      transition: var(--transition);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .login-logo i {
      font-size: 2.5rem;
      color: var(--color-secondary);
      margin-bottom: 8px;
      filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.3));
    }

    .login-logo h2 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .login-tabs {
      display: flex;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .login-tab-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: var(--text-on-sidebar);
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: var(--transition-fast);
    }

    .login-tab-btn.active {
      color: var(--color-secondary);
      border-bottom-color: var(--color-secondary);
    }

    .form-panel {
      display: none;
    }

    .form-panel.active {
      display: block;
    }

    .login-form .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .login-form .form-label {
      color: var(--text-on-sidebar);
      font-weight: 500;
      font-size: 0.85rem;
    }

    .login-form .form-control {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ffffff;
      padding-right: 48px;
    }

    .login-form .form-control:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--color-secondary);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
    }

    .pwd-toggle-icon {
      position: absolute;
      right: 16px;
      top: 38px;
      cursor: pointer;
      color: var(--text-on-sidebar);
      transition: var(--transition-fast);
      font-size: 0.95rem;
    }

    .pwd-toggle-icon:hover {
      color: #ffffff;
    }

    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 0.85rem;
      color: var(--text-on-sidebar);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--color-secondary), #d97706);
      border: none;
      color: #000000;
      border-radius: var(--radius-md);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-glow);
      transition: var(--transition);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(245, 158, 11, 0.4);
    }

    /* Loading overlay */
    .loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(245, 158, 11, 0.1);
      border-left-color: var(--color-secondary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Global Error Logger -->
  <script>
    window.addEventListener('error', function(e) {
      console.error("Global Error Intercepted:", e);
      var errOverlay = document.getElementById('global-error-overlay');
      if (!errOverlay) {
        errOverlay = document.createElement('div');
        errOverlay.id = 'global-error-overlay';
        errOverlay.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);color:#be123c;padding:40px;z-index:999999;font-family:monospace;overflow:auto;box-sizing:border-box;';
        document.body.appendChild(errOverlay);
      }
      errOverlay.innerHTML = '<h2>Erreur Critique de l\'Application</h2>' +
        '<p>L\'application a planté lors de l\'initialisation. Détails techniques :</p>' +
        '<pre style="background:#f1f5f9;padding:15px;border-radius:6px;border:1px solid #cbd5e1;color:#334155;margin-top:15px;">' +
        e.message + '\n\nFichier: ' + e.filename + '\nLigne: ' + e.lineno + ', Col: ' + e.colno + '\n\n' +
        (e.error ? (e.error.stack || '') : '') + '</pre>' +
        '<button onclick="window.location.reload()" style="background:#be123c;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-weight:600;cursor:pointer;margin-top:15px;">Recharger la page</button>';
      
      // Dismiss loading overlay if present
      var loader = document.getElementById('loading-overlay');
      if (loader) loader.remove();
    });
    window.addEventListener('unhandledrejection', function(e) {
      console.error("Global Promise Rejection Intercepted:", e);
      var errOverlay = document.getElementById('global-error-overlay');
      if (!errOverlay) {
        errOverlay = document.createElement('div');
        errOverlay.id = 'global-error-overlay';
        errOverlay.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);color:#be123c;padding:40px;z-index:999999;font-family:monospace;overflow:auto;box-sizing:border-box;';
        document.body.appendChild(errOverlay);
      }
      errOverlay.innerHTML = '<h2>Rejet de Promesse Non Géré</h2>' +
        '<p>Une opération asynchrone a échoué. Détails :</p>' +
        '<pre style="background:#f1f5f9;padding:15px;border-radius:6px;border:1px solid #cbd5e1;color:#334155;margin-top:15px;">' +
        e.reason + '\n\n' + (e.reason && e.reason.stack ? e.reason.stack : '') + '</pre>' +
        '<button onclick="window.location.reload()" style="background:#be123c;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-weight:600;cursor:pointer;margin-top:15px;">Recharger la page</button>';
      
      var loader = document.getElementById('loading-overlay');
      if (loader) loader.remove();
    });
  </script>
</head>
<body>
  <!-- Loader Screen -->
  <div class="loader-overlay" id="loading-overlay">
    <div class="spinner"></div>
  </div>

  <div class="login-container">
    <div class="login-logo">
      <i class="fa-solid fa-gem"></i>
      <h2>SallePro</h2>
      <p style="color: var(--text-on-sidebar); font-size: 0.85rem; margin-top: 4px;">Système Interne de Gestion de Salle</p>
    </div>

    <!-- Login/Register Tabs -->
    <div class="login-tabs">
      <button class="login-tab-btn active" id="tab-signin-btn">Connexion</button>
      <button class="login-tab-btn" id="tab-signup-btn">Inscription</button>
    </div>

    <!-- Panel 1: Connexion -->
    <div class="form-panel active" id="panel-signin">
      <form class="login-form" id="signin-form">
        <div class="form-group">
          <label class="form-label" for="signin-email">Email professionnel</label>
          <input type="email" class="form-control" id="signin-email" required placeholder="admin@sallepro.com" value="admin@sallepro.com">
        </div>

        <div class="form-group">
          <label class="form-label" for="signin-password">Mot de passe</label>
          <input type="password" class="form-control" id="signin-password" required placeholder="••••••••" value="admin123">
          <i class="fa-solid fa-eye-slash pwd-toggle-icon" id="signin-pwd-toggle"></i>
        </div>

        <div class="login-options">
          <label class="checkbox-label">
            <input type="checkbox" class="checkbox-input" checked id="signin-remember">
            <span>Se souvenir de moi</span>
          </label>
          <a href="#" onclick="alert('Veuillez contacter le support Firebase ou votre administrateur.'); return false;">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn-login" id="signin-submit-btn">
          <span id="signin-btn-text">Se connecter</span>
        </button>
      </form>
    </div>

    <!-- Panel 2: Inscription -->
    <div class="form-panel" id="panel-signup">
      <form class="login-form" id="signup-form">
        <div class="form-group">
          <label class="form-label" for="signup-name">Nom complet</label>
          <input type="text" class="form-control" id="signup-name" required placeholder="Ex: Jean Dupont">
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-email">Email de l'administrateur</label>
          <input type="email" class="form-control" id="signup-email" required placeholder="Ex: jean.dupont@sallepro.com">
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-password">Mot de passe</label>
          <input type="password" class="form-control" id="signup-password" required placeholder="Au moins 6 caractères">
          <i class="fa-solid fa-eye-slash pwd-toggle-icon" id="signup-pwd-toggle"></i>
        </div>

        <div class="form-group">
          <label class="form-label" for="signup-confirm-password">Confirmer le mot de passe</label>
          <input type="password" class="form-control" id="signup-confirm-password" required placeholder="Confirmer mot de passe">
        </div>

        <button type="submit" class="btn-login" id="signup-submit-btn">
          <span id="signup-btn-text">Créer le compte Propriétaire</span>
        </button>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="js/auth.js"></script>
  <script type="module">
    import { loginUser, registerAdmin } from "./js/auth.js";
    import { showToast } from "./js/app.js";

    // 1. Tab switches
    const tabSignin = document.getElementById('tab-signin-btn');
    const tabSignup = document.getElementById('tab-signup-btn');
    const panelSignin = document.getElementById('panel-signin');
    const panelSignup = document.getElementById('panel-signup');

    tabSignin.addEventListener('click', () => {
      tabSignin.classList.add('active');
      tabSignup.classList.remove('active');
      panelSignin.classList.add('active');
      panelSignup.classList.remove('active');
    });

    tabSignup.addEventListener('click', () => {
      tabSignup.classList.add('active');
      tabSignin.classList.remove('active');
      panelSignup.classList.add('active');
      panelSignin.classList.remove('active');
    });

    // 2. Toggle Password Visibilities
    const togglePasswordVisibility = (inputId, iconId) => {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      icon.addEventListener('click', () => {
        if (input.type === 'password') {
          input.type = 'text';
          icon.className = 'fa-solid fa-eye';
        } else {
          input.type = 'password';
          icon.className = 'fa-solid fa-eye-slash';
        }
      });
    };

    togglePasswordVisibility('signin-password', 'signin-pwd-toggle');
    togglePasswordVisibility('signup-password', 'signup-pwd-toggle');

    // 3. Connexion Form Submit
    document.getElementById('signin-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      const rememberMe = document.getElementById('signin-remember').checked;
      const submitBtn = document.getElementById('signin-submit-btn');
      const btnText = document.getElementById('signin-btn-text');

      btnText.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Connexion...';
      submitBtn.disabled = true;

      try {
        await loginUser(email, password, rememberMe);
        // auth.js automatically handles redirection via onAuthStateChanged
      } catch (err) {
        let msg = "Erreur d'authentification.";
        if (err.code === 'auth/invalid-credential') {
          msg = "Email ou mot de passe incorrect.";
        } else if (err.code === 'auth/invalid-email') {
          msg = "Adresse email invalide.";
        }
        showToast('Échec de connexion', msg, 'danger');
        btnText.innerText = 'Se connecter';
        submitBtn.disabled = false;
      }
    });

    // 4. Inscription Form Submit
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirmPassword = document.getElementById('signup-confirm-password').value;
      const submitBtn = document.getElementById('signup-submit-btn');
      const btnText = document.getElementById('signup-btn-text');

      if (password.length < 6) {
        showToast('Validation', 'Le mot de passe doit comporter au moins 6 caractères.', 'warning');
        return;
      }

      if (password !== confirmPassword) {
        showToast('Validation', 'Les mots de passe ne correspondent pas.', 'warning');
        return;
      }

      btnText.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Création...';
      submitBtn.disabled = true;

      try {
        await registerAdmin(name, email, password);
        showToast('Compte créé', 'Votre compte a été configuré avec succès !', 'success');
        // auth.js handles page routing
      } catch (err) {
        let msg = "Impossible de créer le compte.";
        if (err.code === 'auth/email-already-in-use') {
          msg = "Cet email est déjà lié à un compte.";
        }
        showToast('Échec d\'inscription', msg, 'danger');
        btnText.innerText = 'Créer le compte Propriétaire';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
