<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SallePro – Clients</title>
  <meta name="description" content="Gestion de la clientèle CRM de SallePro." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <!-- Global Error Logger -->
  <script>
    window.addEventListener('error', function(e) {
      console.error("Global Error Intercepted:", e);
      var errOverlay = document.getElementById('global-error-overlay');
      if (!errOverlay) {
        errOverlay = document.createElement('div');
        errOverlay.id = 'global-error-overlay';
        errOverlay.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);color:#be123c;padding:40px;z-index:999999;font-family:monospace;overflow:auto;box-sizing:border-box;';
        document.body.appendChild(errOverlay);
      }
      errOverlay.innerHTML = '<h2>Erreur Critique de l\'Application</h2>' +
        '<p>L\'application a planté lors de l\'initialisation. Détails techniques :</p>' +
        '<pre style="background:#f1f5f9;padding:15px;border-radius:6px;border:1px solid #cbd5e1;color:#334155;margin-top:15px;">' +
        e.message + '\n\nFichier: ' + e.filename + '\nLigne: ' + e.lineno + ', Col: ' + e.colno + '\n\n' +
        (e.error ? (e.error.stack || '') : '') + '</pre>' +
        '<button onclick="window.location.reload()" style="background:#be123c;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-weight:600;cursor:pointer;margin-top:15px;">Recharger la page</button>';
      
      // Dismiss loading overlay if present
      var loader = document.getElementById('loading-overlay');
      if (loader) loader.remove();
    });
    window.addEventListener('unhandledrejection', function(e) {
      console.error("Global Promise Rejection Intercepted:", e);
      var errOverlay = document.getElementById('global-error-overlay');
      if (!errOverlay) {
        errOverlay = document.createElement('div');
        errOverlay.id = 'global-error-overlay';
        errOverlay.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);color:#be123c;padding:40px;z-index:999999;font-family:monospace;overflow:auto;box-sizing:border-box;';
        document.body.appendChild(errOverlay);
      }
      errOverlay.innerHTML = '<h2>Rejet de Promesse Non Géré</h2>' +
        '<p>Une opération asynchrone a échoué. Détails :</p>' +
        '<pre style="background:#f1f5f9;padding:15px;border-radius:6px;border:1px solid #cbd5e1;color:#334155;margin-top:15px;">' +
        e.reason + '\n\n' + (e.reason && e.reason.stack ? e.reason.stack : '') + '</pre>' +
        '<button onclick="window.location.reload()" style="background:#be123c;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-weight:600;cursor:pointer;margin-top:15px;">Recharger la page</button>';
      
      var loader = document.getElementById('loading-overlay');
      if (loader) loader.remove();
    });
  </script>
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loader-overlay" id="loading-overlay"><div class="spinner"></div></div>

  <div class="app-container" id="app-container" style="display:none;">
    <!-- Sidebar injected by app.js -->
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content" id="main-content">
      <!-- Section Header -->
      <div class="section-header">
        <div class="section-header-left">
          <h1 class="section-title"><i class="fa-solid fa-users"></i> Clients</h1>
          <p class="section-subtitle">Gérez votre portefeuille clients CRM.</p>
        </div>
        <div class="section-header-actions">
          <button class="btn btn-primary" id="open-add-client-btn">
            <i class="fa-solid fa-user-plus"></i> Nouveau Client
          </button>
        </div>
      </div>

      <!-- Two-column grid -->
      <div class="clients-layout-grid" style="display:grid;grid-template-columns:1fr 380px;gap:24px;align-items:start;">

        <!-- LEFT: Clients Table -->
        <div class="card table-card">
          <div class="card-header">
            <div class="form-group" style="margin:0;flex:1;">
              <div class="input-with-icon">
                <i class="fa-solid fa-magnifying-glass input-icon"></i>
                <input type="text" class="form-control" id="search-clients" placeholder="Rechercher un client…" />
              </div>
            </div>
          </div>
          <div class="card-body table-responsive">
            <table class="table table-premium" id="clients-table">
              <thead>
                <tr>
                  <th>Nom</th>
                  <th>Téléphone</th>
                  <th>Email</th>
                  <th>Réservations</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="clients-table-body"></tbody>
            </table>
            <!-- Empty State -->
            <div class="empty-state" id="clients-empty-state" style="display:none;">
              <div class="empty-state-icon"><i class="fa-solid fa-users-slash"></i></div>
              <h3 class="empty-state-title">Aucun client trouvé</h3>
              <p class="empty-state-text">Ajoutez votre premier client pour commencer.</p>
              <button class="btn btn-primary" id="empty-add-client-btn">
                <i class="fa-solid fa-user-plus"></i> Ajouter un client
              </button>
            </div>
          </div>
        </div>

        <!-- RIGHT: Client Profile Card -->
        <div class="card" id="client-profile-card">
          <div class="card-header">
            <h3 class="card-title"><i class="fa-solid fa-id-card"></i> Fiche Client</h3>
          </div>
          <div class="card-body" id="profile-card-content">
            <div class="profile-placeholder" style="text-align:center;padding:40px 20px;color:var(--text-muted);">
              <i class="fa-solid fa-arrow-pointer" style="font-size:2.5rem;margin-bottom:12px;display:block;opacity:0.4;"></i>
              <p>Sélectionnez un client pour afficher sa fiche.</p>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- ============================================================
       CLIENT MODAL
  ============================================================ -->
  <div class="modal-overlay" id="client-modal" style="display:none;">
    <div class="modal modal-md">
      <div class="modal-header">
        <h2 class="modal-title" id="client-modal-title">Nouveau Client</h2>
        <button class="modal-close" id="close-client-modal"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <form id="client-form" novalidate>
          <input type="hidden" id="client-id" />

          <div class="form-grid form-grid-2">
            <div class="form-group">
              <label class="form-label required" for="client-name">Nom complet</label>
              <input type="text" class="form-control" id="client-name" placeholder="ex: Amina Benali" required />
            </div>
            <div class="form-group">
              <label class="form-label required" for="client-phone">Téléphone</label>
              <input type="tel" class="form-control" id="client-phone" placeholder="+213 0555 …" required />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="client-email">Adresse e-mail</label>
            <input type="email" class="form-control" id="client-email" placeholder="ex: amina@email.com" />
          </div>

          <div class="form-group">
            <label class="form-label" for="client-address">Adresse</label>
            <input type="text" class="form-control" id="client-address" placeholder="Rue, ville, wilaya…" />
          </div>

          <div class="form-group">
            <label class="form-label" for="client-notes">Notes</label>
            <textarea class="form-control" id="client-notes" rows="3" placeholder="Informations complémentaires…"></textarea>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-outline" id="cancel-client-btn">Annuler</button>
            <button type="submit" class="btn btn-primary" id="save-client-btn">
              <i class="fa-solid fa-floppy-disk"></i> Enregistrer
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/clients.js"></script>
</body>
</html>
