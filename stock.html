<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SallePro – Stock & Équipements</title>
  <meta name="description" content="Gestion du stock et des équipements SallePro." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <style>
    .stock-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:24px; }
    @media(max-width:1200px){.stock-grid{grid-template-columns:repeat(3,1fr);}}
    @media(max-width:768px){.stock-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:480px){.stock-grid{grid-template-columns:1fr;}}
    .stock-card{background-color:var(--bg-surface);border-radius:var(--radius-lg);border:1px solid var(--border-color);overflow:hidden;box-shadow:var(--shadow-sm);transition:var(--transition);display:flex;flex-direction:column;}
    .stock-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-md);border-color:var(--color-secondary);}
    .stock-card-img{height:140px;display:flex;align-items:center;justify-content:center;font-size:3rem;background:linear-gradient(135deg,var(--bg-sidebar),#1e293b);color:var(--color-secondary);position:relative;}
    .stock-card-img.alert-active::after{content:'STOCK BAS';position:absolute;top:10px;right:10px;background:var(--danger);color:#fff;font-size:0.65rem;font-weight:700;padding:3px 8px;border-radius:50px;letter-spacing:0.5px;}
    .stock-card-body{padding:16px;display:flex;flex-direction:column;gap:10px;flex:1;}
    .stock-card-title{font-size:0.95rem;font-weight:700;color:var(--text-main);}
    .stock-card-actions{border-top:1px solid var(--border-color);padding:10px 16px;display:flex;gap:8px;background-color:var(--bg-surface-hover);}
  </style>

  <!-- Global Error Logger -->
  <script>
    window.addEventListener('error', function(e) {
      console.error("Global Error Intercepted:", e);
      var errOverlay = document.getElementById('global-error-overlay');
      if (!errOverlay) {
        errOverlay = document.createElement('div');
        errOverlay.id = 'global-error-overlay';
        errOverlay.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);color:#be123c;padding:40px;z-index:999999;font-family:monospace;overflow:auto;box-sizing:border-box;';
        document.body.appendChild(errOverlay);
      }
      errOverlay.innerHTML = '<h2>Erreur Critique de l\'Application</h2>' +
        '<p>L\'application a planté lors de l\'initialisation. Détails techniques :</p>' +
        '<pre style="background:#f1f5f9;padding:15px;border-radius:6px;border:1px solid #cbd5e1;color:#334155;margin-top:15px;">' +
        e.message + '\n\nFichier: ' + e.filename + '\nLigne: ' + e.lineno + ', Col: ' + e.colno + '\n\n' +
        (e.error ? (e.error.stack || '') : '') + '</pre>' +
        '<button onclick="window.location.reload()" style="background:#be123c;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-weight:600;cursor:pointer;margin-top:15px;">Recharger la page</button>';
      
      // Dismiss loading overlay if present
      var loader = document.getElementById('loading-overlay');
      if (loader) loader.remove();
    });
    window.addEventListener('unhandledrejection', function(e) {
      console.error("Global Promise Rejection Intercepted:", e);
      var errOverlay = document.getElementById('global-error-overlay');
      if (!errOverlay) {
        errOverlay = document.createElement('div');
        errOverlay.id = 'global-error-overlay';
        errOverlay.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);color:#be123c;padding:40px;z-index:999999;font-family:monospace;overflow:auto;box-sizing:border-box;';
        document.body.appendChild(errOverlay);
      }
      errOverlay.innerHTML = '<h2>Rejet de Promesse Non Géré</h2>' +
        '<p>Une opération asynchrone a échoué. Détails :</p>' +
        '<pre style="background:#f1f5f9;padding:15px;border-radius:6px;border:1px solid #cbd5e1;color:#334155;margin-top:15px;">' +
        e.reason + '\n\n' + (e.reason && e.reason.stack ? e.reason.stack : '') + '</pre>' +
        '<button onclick="window.location.reload()" style="background:#be123c;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-weight:600;cursor:pointer;margin-top:15px;">Recharger la page</button>';
      
      var loader = document.getElementById('loading-overlay');
      if (loader) loader.remove();
    });
  </script>
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loader-overlay" id="loading-overlay"><div class="spinner"></div></div>

  <div class="app-container" id="app-container" style="display:none;">
    <!-- Sidebar injected by app.js -->
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content" id="main-content">
      <!-- Section Header -->
      <div class="section-header">
        <div class="section-header-left">
          <h1 class="section-title"><i class="fa-solid fa-boxes-stacked"></i> Stock & Équipements</h1>
          <p class="section-subtitle">Suivez et gérez vos équipements et stocks disponibles.</p>
        </div>
        <div class="section-header-actions">
          <button class="btn btn-primary" id="open-add-stock-btn">
            <i class="fa-solid fa-plus"></i> Nouvel Article
          </button>
        </div>
      </div>

      <!-- Filter Card -->
      <div class="card filter-card">
        <div class="card-body">
          <div class="filters-grid" style="display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:16px;align-items:end;">
            <div class="form-group" style="margin:0;">
              <label class="form-label" for="search-stock"><i class="fa-solid fa-magnifying-glass"></i> Rechercher</label>
              <input type="text" class="form-control" id="search-stock" placeholder="Nom de l'article…" />
            </div>
            <div class="form-group" style="margin:0;">
              <label class="form-label" for="filter-stock-category">Catégorie</label>
              <select class="form-control" id="filter-stock-category">
                <option value="all">Toutes les catégories</option>
                <option value="Chaises">Chaises</option>
                <option value="Tables">Tables</option>
                <option value="Décoration">Décoration</option>
                <option value="Vaisselle">Vaisselle</option>
                <option value="Sonorisation">Sonorisation</option>
                <option value="Éclairage">Éclairage</option>
              </select>
            </div>
            <div class="form-group" style="margin:0;display:flex;align-items:center;gap:10px;padding-top:22px;">
              <input type="checkbox" id="filter-low-stock-only" style="width:18px;height:18px;accent-color:var(--danger);cursor:pointer;" />
              <label for="filter-low-stock-only" style="cursor:pointer;font-size:0.9rem;color:var(--text-secondary);white-space:nowrap;">Stock bas seulement</label>
            </div>
            <div style="padding-top:22px;">
              <button class="btn btn-outline" id="reset-stock-filters-btn">
                <i class="fa-solid fa-rotate-left"></i> Réinitialiser
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Stock Grid -->
      <div class="stock-grid" id="stock-grid-container"></div>

      <!-- Empty State -->
      <div class="empty-state card" id="stock-empty-state" style="display:none;">
        <div class="card-body" style="text-align:center;padding:60px 20px;">
          <div class="empty-state-icon"><i class="fa-solid fa-box-open"></i></div>
          <h3 class="empty-state-title">Aucun article en stock</h3>
          <p class="empty-state-text">Ajoutez votre premier article ou équipement.</p>
          <button class="btn btn-primary" id="empty-add-stock-btn">
            <i class="fa-solid fa-plus"></i> Ajouter un article
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- ============================================================
       STOCK MODAL
  ============================================================ -->
  <div class="modal-overlay" id="stock-modal" style="display:none;">
    <div class="modal modal-md">
      <div class="modal-header">
        <h2 class="modal-title" id="stock-modal-title">Nouvel Article</h2>
        <button class="modal-close" id="close-stock-modal"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <form id="stock-form" novalidate>
          <input type="hidden" id="stock-id" />

          <div class="form-group">
            <label class="form-label required" for="stock-name">Nom de l'article</label>
            <input type="text" class="form-control" id="stock-name" placeholder="ex: Chaise Napoléon" required />
          </div>

          <div class="form-group">
            <label class="form-label required" for="stock-category">Catégorie</label>
            <select class="form-control" id="stock-category" required>
              <option value="">-- Choisir une catégorie --</option>
              <option value="Chaises">Chaises</option>
              <option value="Tables">Tables</option>
              <option value="Décoration">Décoration</option>
              <option value="Vaisselle">Vaisselle</option>
              <option value="Sonorisation">Sonorisation</option>
              <option value="Éclairage">Éclairage</option>
            </select>
          </div>

          <div class="form-grid form-grid-3">
            <div class="form-group">
              <label class="form-label required" for="stock-quantity">Quantité</label>
              <input type="number" class="form-control" id="stock-quantity" min="0" placeholder="ex: 200" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="stock-min-alert">Seuil d'alerte</label>
              <input type="number" class="form-control" id="stock-min-alert" min="0" placeholder="ex: 20" />
            </div>
            <div class="form-group">
              <label class="form-label" for="stock-price">Prix unitaire (DA)</label>
              <input type="number" class="form-control" id="stock-price" min="0" step="100" placeholder="ex: 1500" />
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-outline" id="cancel-stock-btn">Annuler</button>
            <button type="submit" class="btn btn-primary" id="save-stock-btn">
              <i class="fa-solid fa-floppy-disk"></i> Enregistrer
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/stock.js"></script>
</body>
</html>
