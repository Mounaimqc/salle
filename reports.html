<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SallePro – Rapports & Bilans</title>
  <meta name="description" content="Rapports analytiques et bilans financiers de SallePro." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <!-- Chart.js (non-module, global CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loader-overlay" id="loading-overlay"><div class="spinner"></div></div>

  <div class="app-container" id="app-container" style="display:none;">
    <!-- Sidebar injected by app.js -->
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content" id="main-content">
      <!-- Section Header -->
      <div class="section-header">
        <div class="section-header-left">
          <h1 class="section-title"><i class="fa-solid fa-chart-line"></i> Rapports & Bilans</h1>
          <p class="section-subtitle">Analysez la performance financière annuelle de votre salle.</p>
        </div>
        <div class="section-header-actions">
          <button class="btn btn-outline" id="export-csv-btn">
            <i class="fa-solid fa-file-csv"></i> Exporter CSV
          </button>
          <button class="btn btn-outline" id="print-report-btn" onclick="window.print()">
            <i class="fa-solid fa-print"></i> Imprimer
          </button>
        </div>
      </div>

      <!-- Year Filter Card -->
      <div class="card filter-card" style="margin-bottom:24px;">
        <div class="card-body" style="display:flex;align-items:center;gap:16px;">
          <label class="form-label" style="margin:0;white-space:nowrap;"><i class="fa-solid fa-calendar-year"></i> Année :</label>
          <select class="form-control" id="report-year" style="width:auto;">
            <option value="2026" selected>2026</option>
            <option value="2025">2025</option>
          </select>
        </div>
      </div>

      <!-- KPI Cards Row -->
      <div class="kpi-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:24px;">
        <!-- Revenue KPI -->
        <div class="card kpi-card" id="report-kpi-revenue">
          <div class="card-body kpi-card-body">
            <div class="kpi-icon kpi-icon-success"><i class="fa-solid fa-arrow-trend-up"></i></div>
            <div class="kpi-info">
              <p class="kpi-label">Revenus Totaux</p>
              <p class="kpi-value" id="report-kpi-revenue-val">—</p>
            </div>
          </div>
        </div>
        <!-- Expenses KPI -->
        <div class="card kpi-card" id="report-kpi-expenses">
          <div class="card-body kpi-card-body">
            <div class="kpi-icon kpi-icon-danger"><i class="fa-solid fa-arrow-trend-down"></i></div>
            <div class="kpi-info">
              <p class="kpi-label">Total Dépenses</p>
              <p class="kpi-value" id="report-kpi-expenses-val">—</p>
            </div>
          </div>
        </div>
        <!-- Profit KPI -->
        <div class="card kpi-card" id="report-kpi-profit">
          <div class="card-body kpi-card-body">
            <div class="kpi-icon kpi-icon-primary"><i class="fa-solid fa-sack-dollar"></i></div>
            <div class="kpi-info">
              <p class="kpi-label">Bénéfice Net</p>
              <p class="kpi-value" id="report-kpi-profit-val">—</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Profit Chart Card -->
      <div class="card" style="margin-bottom:24px;">
        <div class="card-header">
          <h3 class="card-title"><i class="fa-solid fa-chart-bar"></i> Évolution Mensuelle</h3>
        </div>
        <div class="card-body" style="position:relative;height:320px;">
          <canvas id="profitReportChart"></canvas>
        </div>
      </div>

      <!-- Monthly Data Table -->
      <div class="card table-card">
        <div class="card-header">
          <h3 class="card-title"><i class="fa-solid fa-table"></i> Détail Mensuel</h3>
        </div>
        <div class="card-body table-responsive">
          <table class="table table-premium" id="reports-table">
            <thead>
              <tr>
                <th>Mois</th>
                <th>Revenus</th>
                <th>Charges Générales</th>
                <th>Salaires</th>
                <th>Total Dépenses</th>
                <th>Bénéfice Net</th>
                <th>Marge %</th>
              </tr>
            </thead>
            <tbody id="reports-table-body"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/reports.js"></script>
</body>
</html>
