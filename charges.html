<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SallePro – Charges & Dépenses</title>
  <meta name="description" content="Gestion des charges et dépenses de SallePro." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <!-- Chart.js (non-module, global CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Global Error Logger -->
  <script>
    window.addEventListener('error', function(e) {
      console.error("Global Error Intercepted:", e);
      var errOverlay = document.getElementById('global-error-overlay');
      if (!errOverlay) {
        errOverlay = document.createElement('div');
        errOverlay.id = 'global-error-overlay';
        errOverlay.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);color:#be123c;padding:40px;z-index:999999;font-family:monospace;overflow:auto;box-sizing:border-box;';
        document.body.appendChild(errOverlay);
      }
      errOverlay.innerHTML = '<h2>Erreur Critique de l\'Application</h2>' +
        '<p>L\'application a planté lors de l\'initialisation. Détails techniques :</p>' +
        '<pre style="background:#f1f5f9;padding:15px;border-radius:6px;border:1px solid #cbd5e1;color:#334155;margin-top:15px;">' +
        e.message + '\n\nFichier: ' + e.filename + '\nLigne: ' + e.lineno + ', Col: ' + e.colno + '\n\n' +
        (e.error ? (e.error.stack || '') : '') + '</pre>' +
        '<button onclick="window.location.reload()" style="background:#be123c;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-weight:600;cursor:pointer;margin-top:15px;">Recharger la page</button>';
      
      // Dismiss loading overlay if present
      var loader = document.getElementById('loading-overlay');
      if (loader) loader.remove();
    });
    window.addEventListener('unhandledrejection', function(e) {
      console.error("Global Promise Rejection Intercepted:", e);
      var errOverlay = document.getElementById('global-error-overlay');
      if (!errOverlay) {
        errOverlay = document.createElement('div');
        errOverlay.id = 'global-error-overlay';
        errOverlay.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);color:#be123c;padding:40px;z-index:999999;font-family:monospace;overflow:auto;box-sizing:border-box;';
        document.body.appendChild(errOverlay);
      }
      errOverlay.innerHTML = '<h2>Rejet de Promesse Non Géré</h2>' +
        '<p>Une opération asynchrone a échoué. Détails :</p>' +
        '<pre style="background:#f1f5f9;padding:15px;border-radius:6px;border:1px solid #cbd5e1;color:#334155;margin-top:15px;">' +
        e.reason + '\n\n' + (e.reason && e.reason.stack ? e.reason.stack : '') + '</pre>' +
        '<button onclick="window.location.reload()" style="background:#be123c;color:#fff;border:none;padding:10px 20px;border-radius:6px;font-weight:600;cursor:pointer;margin-top:15px;">Recharger la page</button>';
      
      var loader = document.getElementById('loading-overlay');
      if (loader) loader.remove();
    });
  </script>
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loader-overlay" id="loading-overlay"><div class="spinner"></div></div>

  <div class="app-container" id="app-container" style="display:none;">
    <!-- Sidebar injected by app.js -->
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content" id="main-content">
      <!-- Section Header -->
      <div class="section-header">
        <div class="section-header-left">
          <h1 class="section-title"><i class="fa-solid fa-file-invoice-dollar"></i> Charges & Dépenses</h1>
          <p class="section-subtitle">Suivez et analysez toutes vos dépenses opérationnelles.</p>
        </div>
        <div class="section-header-actions">
          <button class="btn btn-primary" id="open-add-expense-btn">
            <i class="fa-solid fa-plus"></i> Nouvelle Dépense
          </button>
        </div>
      </div>

      <!-- Two-column layout -->
      <div class="charges-layout-grid" style="display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start;">

        <!-- LEFT: Expenses Table -->
        <div class="card table-card">
          <div class="card-header">
            <div class="filters-row" style="display:flex;gap:12px;flex-wrap:wrap;width:100%;">
              <div class="form-group" style="margin:0;flex:1;min-width:180px;">
                <div class="input-with-icon">
                  <i class="fa-solid fa-magnifying-glass input-icon"></i>
                  <input type="text" class="form-control" id="search-expenses" placeholder="Rechercher une dépense…" />
                </div>
              </div>
              <div class="form-group" style="margin:0;">
                <select class="form-control" id="filter-expense-category">
                  <option value="all">Toutes catégories</option>
                  <option value="Électricité">Électricité</option>
                  <option value="Eau">Eau</option>
                  <option value="Internet">Internet</option>
                  <option value="Salaires">Salaires</option>
                  <option value="Maintenance">Maintenance</option>
                  <option value="Achats">Achats</option>
                  <option value="Divers">Divers</option>
                </select>
              </div>
              <div class="form-group" style="margin:0;">
                <input type="month" class="form-control" id="filter-expense-month" value="2026-06" />
              </div>
            </div>
          </div>
          <div class="card-body table-responsive">
            <table class="table table-premium" id="expenses-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Catégorie</th>
                  <th>Montant</th>
                  <th>Description</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="expenses-table-body"></tbody>
            </table>
            <!-- Empty State -->
            <div class="empty-state" id="expenses-empty-state" style="display:none;">
              <div class="empty-state-icon"><i class="fa-solid fa-receipt"></i></div>
              <h3 class="empty-state-title">Aucune dépense enregistrée</h3>
              <p class="empty-state-text">Commencez à enregistrer vos dépenses du mois.</p>
              <button class="btn btn-primary" id="empty-add-expense-btn">
                <i class="fa-solid fa-plus"></i> Ajouter une dépense
              </button>
            </div>
          </div>
        </div>

        <!-- RIGHT: Analytics Panel -->
        <div class="card analytics-panel">
          <div class="card-header">
            <h3 class="card-title"><i class="fa-solid fa-chart-pie"></i> Analyse</h3>
            <span class="badge badge-secondary" id="analytics-month-label">Juin 2026</span>
          </div>
          <div class="card-body" style="display:flex;flex-direction:column;gap:20px;">
            <!-- Total -->
            <div class="kpi-mini-card" style="background:linear-gradient(135deg,var(--bg-sidebar),#1e293b);border-radius:var(--radius-md);padding:20px;text-align:center;">
              <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;">Total dépenses</p>
              <p class="kpi-value" id="analytics-total-outlay" style="font-size:2rem;font-weight:800;color:var(--danger);">0 DA</p>
            </div>
            <!-- Doughnut Chart -->
            <div style="position:relative;height:200px;display:flex;align-items:center;justify-content:center;">
              <canvas id="chargesMiniDoughnut"></canvas>
            </div>
            <!-- Category List -->
            <div id="analytics-category-list" style="display:flex;flex-direction:column;gap:8px;"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- ============================================================
       EXPENSE MODAL
  ============================================================ -->
  <div class="modal-overlay" id="expense-modal" style="display:none;">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 class="modal-title" id="expense-modal-title">Nouvelle Dépense</h2>
        <button class="modal-close" id="close-expense-modal"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <form id="expense-form" novalidate>
          <input type="hidden" id="expense-id" />

          <div class="form-grid form-grid-2">
            <div class="form-group">
              <label class="form-label required" for="expense-date">Date</label>
              <input type="date" class="form-control" id="expense-date" required />
            </div>
            <div class="form-group">
              <label class="form-label required" for="expense-category">Catégorie</label>
              <select class="form-control" id="expense-category" required>
                <option value="">-- Choisir --</option>
                <option value="Électricité">Électricité</option>
                <option value="Eau">Eau</option>
                <option value="Internet">Internet</option>
                <option value="Salaires">Salaires</option>
                <option value="Maintenance">Maintenance</option>
                <option value="Achats">Achats</option>
                <option value="Divers">Divers</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label required" for="expense-amount">Montant (DA)</label>
            <input type="number" class="form-control" id="expense-amount" min="0" step="100" placeholder="ex: 8500" required />
          </div>

          <div class="form-group">
            <label class="form-label" for="expense-desc">Description</label>
            <textarea class="form-control" id="expense-desc" rows="3" placeholder="Détails de la dépense…"></textarea>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-outline" id="cancel-expense-btn">Annuler</button>
            <button type="submit" class="btn btn-primary" id="save-expense-btn">
              <i class="fa-solid fa-floppy-disk"></i> Enregistrer
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/charges.js"></script>
</body>
</html>
